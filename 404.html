<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Redirecting | Cartertek LLC</title>
  <meta name="robots" content="noindex">
  <script>
    (function () {
      var target = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace("/?route=" + encodeURIComponent(target));
    })();
  </script>
</head>
<body>
  <main>
    <h1>Redirecting</h1>
    <p><a id="fallback-link" href="/">Go to Cartertek</a></p>
  </main>
  <script>
    document.getElementById("fallback-link").href = "/?route=" + encodeURIComponent(window.location.pathname + window.location.search + window.location.hash);
  </script>
</body>
</html>
